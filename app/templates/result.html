{% extends "base.html" %}

{% block content %}
<div class="gs-reveal" style="display: flex; flex-direction: column; align-items: stretch; justify-content: center; flex: 1; padding: 4rem 0;">
    
    {% if success %}
        <div class="block-card data-hover" style="background: var(--ink-primary); color: var(--bg-primary); padding: 10rem 4rem; text-align: center; border-color: transparent;">
            <h1 style="font-size: clamp(4rem, 15vw, 10rem); color: var(--bg-primary); letter-spacing: -0.05em; line-height: 0.85; margin-bottom: 2rem;">SUCCESS</h1>
            <p style="margin-top: 3rem; border-top: var(--border-weight) solid rgba(245,246,247,0.2); padding-top: 3rem; font-size: 1.75rem; text-transform: uppercase; font-weight: 500; font-family: var(--font-mono); letter-spacing: 0.05em;">
                Formatting Complete. Your page is ready.
            </p>
        </div>
    {% else %}
        <div class="block-card data-hover" style="background: transparent; border: var(--border-weight) solid #ff3366; color: #ff3366; padding: 10rem 4rem; text-align: center; box-shadow: 8px 8px 0px #ff3366;">
            <h1 style="font-size: clamp(4rem, 15vw, 10rem); color: #ff3366; letter-spacing: -0.05em; line-height: 0.85; margin-bottom: 2rem;">ERROR</h1>
            <p style="margin-top: 3rem; border-top: var(--border-weight) solid #ff3366; padding-top: 3rem; font-size: 1.75rem; text-transform: uppercase; font-weight: 500; font-family: var(--font-mono); letter-spacing: 0.05em; color: var(--ink-primary);">
                Something went wrong. Please check your connection.
            </p>
        </div>
    {% endif %}
    
    <div style="margin-top: 6rem; text-align: center;">
        <a href="/" class="btn btn-primary data-hover" style="font-size: 1.25rem; padding: 1.5rem 4rem;">RETURN HOME</a>
    </div>
    
</div>
{% endblock %}
